name: customer-support-env
description: Realistic customer support ticket triage and response environment
version: "1.0.0"
entry_point: env:SupportEnv

observation_space:
  type: object
  fields:
    current_ticket:
      type: object
      fields:
        id:
          type: int
        content:
          type: str
        priority:
          type: str
          enum: [low, medium, high]
    history:
      type: list
      items:
        type: object
        fields:
          action_type:
            type: str
            enum: [classify, respond, escalate]
          category:
            type: str
            enum: [delivery, refund, technical, general]
            nullable: true
          response:
            type: str
            nullable: true
          escalate:
            type: bool
            nullable: true

action_space:
  type: object
  fields:
    action_type:
      type: str
      enum: [classify, respond, escalate]
    category:
      type: str
      enum: [delivery, refund, technical, general]
      nullable: true
    response:
      type: str
      nullable: true
    escalate:
      type: bool
      nullable: true

reward:
  type: object
  fields:
    score:
      type: float
      minimum: 0.0
      maximum: 1.0
    reason:
      type: str

tasks:
  easy:
    description: Classification-only evaluation.
    objective: Predict the correct ticket category.
  medium:
    description: Classification and response evaluation.
    objective: Predict category and provide relevant customer response.
  hard:
    description: Full triage evaluation with escalation and efficiency shaping.
    objective: Classify, respond, escalate when needed, and resolve efficiently.
